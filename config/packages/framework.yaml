# see https://symfony.com/doc/current/reference/configuration/framework.html

framework:
    secret: '%env(APP_SECRET)%'

    default_locale: fr

    translator:
        default_path: '%kernel.project_dir%/translations'
        fallbacks:
            - fr

    # La session démarre uniquement si elle est utilisée.
    session: true

    rate_limiter:
        contact_form:
            policy: fixed_window
            limit: 1                
            interval: '10 minute'

    # esi: true
    # fragments: true

when@test:
    framework:
        test: true

        session:
            storage_factory_id: session.storage.factory.mock_file