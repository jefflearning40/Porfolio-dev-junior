projects:
  page_title: Mes créations
  title: Mes créations

  intro: >
    Découvrez les principaux projets que j’ai réalisés
    au cours de ma formation et de mon parcours de développeur.

  status:
    in_progress: En cours
    completed: Terminé

  links:
    github: GitHub
    website: Voir en ligne
    github_aria: Voir le dépôt GitHub de %project%
    website_aria: Voir %project% en ligne

  items:
    portfolio:
      name: Portfolio développeur
      description: >
        Portfolio professionnel conçu pour présenter
        mes compétences, mes projets, mon CV
        et mon profil de développeur web.

    shop_manager:
      name: Shop Manager
      description: >
        Application de gestion commerciale développée avec React.
        Elle permettra de gérer les produits, les catégories,
        les stocks et les commandes au sein d’une interface moderne.

    irregular_verbs:
      name: Irregular Verbs
      description: >
        Application pédagogique permettant d’apprendre,
        de réviser et de tester les verbes irréguliers anglais
        grâce à différents exercices interactifs.

    bpm:
      name: BPM
      description: >
        Application permettant de calculer et d’afficher
        les battements par minute. Ce projet a été réalisé
        afin d’approfondir les manipulations JavaScript
        et les interactions avec l’utilisateur.

    magscan:
      name: MagScan
      description: >
        Projet de site vitrine réalisé pour une chaîne fictive
        de magasins implantés en centre-ville.

    plumbing_item:
      name: Plumbing Item
      description: >
        Application de gestion de produits de plomberie,
        du stock, des ventes et des statistiques.

rgpd:
  page_title: Politique de confidentialité
  title: Politique de confidentialité

  intro: >
    Cette page explique comment les données personnelles
    sont collectées, utilisées et protégées sur ce portfolio.

  controller:
    title: Responsable du traitement
    text: >
      Le responsable du traitement des données personnelles
      est le propriétaire de ce portfolio.

  data:
    title: Données collectées
    text: >
      Les seules données susceptibles d’être collectées sont celles
      transmises volontairement par l’utilisateur via le formulaire
      de contact, notamment le nom, l’adresse e-mail et le contenu
      du message.

  use:
    title: Utilisation des données
    text: >
      Les données collectées sont utilisées uniquement pour répondre
      aux demandes envoyées via le formulaire de contact.

  storage:
    title: Durée de conservation
    text: >
      Les données sont conservées uniquement pendant la durée nécessaire
      au traitement de la demande, puis supprimées lorsqu’elles ne sont
      plus utiles.

  sharing:
    title: Partage des données
    text: >
      Aucune donnée personnelle n’est vendue, cédée ou transmise
      à des tiers, sauf obligation légale.

  rights:
    title: Vos droits
    text: >
      Conformément à la réglementation applicable, vous pouvez demander
      l’accès, la rectification, l’effacement ou la limitation du traitement
      de vos données personnelles.

  cookies:
    title: Cookies
    text: >
      Ce portfolio n’utilise pas de cookies publicitaires
      ni de dispositifs de suivi à des fins commerciales.

legal_mentions:
  page_title: Mentions légales
  title: Mentions légales

  intro: >
    Cette page présente les informations légales relatives
    à l’éditeur, à l’hébergement et aux conditions
    d’utilisation de ce portfolio.

  publisher:
    title: Éditeur du site
    text: >
      Ce portfolio est édité par Jean-François Delhomme.
      Il a été conçu dans le cadre de mon parcours de développeur
      web afin de présenter mes compétences, mes projets
      et mon expérience.

  hosting:
    title: Hébergement
    text: >
      Ce site est hébergé par un prestataire d’hébergement
      professionnel garantissant la disponibilité et
      la sécurité des données.

  intellectual_property:
    title: Propriété intellectuelle
    text: >
      L’ensemble des contenus présents sur ce portfolio
      (textes, images, illustrations, logos, icônes
      et développements) est protégé par le droit de la
      propriété intellectuelle. Toute reproduction totale
      ou partielle est interdite sans autorisation préalable.

  liability:
    title: Responsabilité
    text: >
      Les informations présentes sur ce portfolio sont
      fournies à titre informatif. Malgré le soin apporté
      à leur rédaction, l’éditeur ne saurait être tenu
      responsable d’éventuelles erreurs, omissions ou
      interruptions de service.

  contact:
    title: Contact
    text: >
      Pour toute demande d’information ou de contact,
      veuillez utiliser le formulaire de contact disponible
      sur ce portfolio.
    button: Me contacter

