rgpd:
  page_title: Privacy Policy
  title: Privacy Policy

  intro: >
    This page explains how personal data is collected,
    used and protected on this portfolio.

  controller:
    title: Data controller
    text: >
      The data controller responsible for personal data
      is the owner of this portfolio.

  data:
    title: Data collected
    text: >
      The only data that may be collected is information
      voluntarily provided by the user through the contact form,
      including the user's name, email address and message content.

  use:
    title: Use of data
    text: >
      The collected data is used solely to respond
      to requests submitted through the contact form.

  storage:
    title: Data retention period
    text: >
      Personal data is retained only for the time necessary
      to process the request and is then deleted when it is
      no longer required.

  sharing:
    title: Data sharing
    text: >
      No personal data is sold, transferred or shared
      with third parties, except where required by law.

  rights:
    title: Your rights
    text: >
      In accordance with applicable regulations,
      you may request access to, correction,
      deletion or restriction of the processing
      of your personal data.

  cookies:
    title: Cookies
    text: >
      This portfolio does not use advertising cookies
      or commercial tracking technologies.

legal_mentions:
  page_title: Legal Notice
  title: Legal Notice

  intro: >
    This page provides the legal information relating
    to the publisher, hosting and conditions of use
    of this portfolio.

  publisher:
    title: Website publisher
    text: >
      This portfolio is published by Jean-François Delhomme.
      It was created as part of my journey as a web developer
      to showcase my skills, projects and professional profile.

  hosting:
    title: Hosting
    text: >
      This website is hosted by a professional hosting
      provider ensuring the availability and security
      of the service.

  intellectual_property:
    title: Intellectual property
    text: >
      All content published on this portfolio
      (texts, images, illustrations, logos, icons
      and source code) is protected by intellectual
      property laws. Any reproduction, in whole or in part,
      is prohibited without prior permission.

  liability:
    title: Liability
    text: >
      The information provided on this portfolio
      is supplied for information purposes only.
      Although every effort is made to keep it accurate,
      the publisher cannot be held responsible for
      any errors, omissions or service interruptions.

  contact:
    title: Contact
    text: >
      For any request or additional information,
      please use the contact form available
      on this portfolio.
    button: Contact me

